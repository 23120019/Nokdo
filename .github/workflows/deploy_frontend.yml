name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: |
          cd frontend-cloudflare
          npm ci
      - name: Build
        run: |
          cd frontend-cloudflare
          npm run build
      - name: Check Cloudflare secrets
        id: check_cf
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ secrets.CF_PAGES_PROJECT_NAME }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ACCOUNT_ID" ] || [ -z "$CF_PAGES_PROJECT_NAME" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Secrets are missing. Deploy will be skipped."
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Cloudflare Pages
        if: ${{ steps.check_cf.outputs.should_deploy == 'true' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          directory: frontend-cloudflare/dist
          projectName: ${{ secrets.CF_PAGES_PROJECT_NAME }}
